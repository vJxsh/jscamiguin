<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Explore Camiguin</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="stylesfolder/main-styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-warning shadow-sm sticky-top py-2">
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="index.html"
        >
          <img src="images/seal.png" alt="Logo" height="40" class="me-1" />
          <span class="fw-bold fs-3">Explore Camiguin</span>
        </a>

        <button
          class="navbar-toggler border-0 shadow-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <div class="mx-auto col-12 col-lg-4 my-3 my-lg-0 position-relative">
            <div class="input-group">
              <input
                type="text"
                class="form-control rounded-pill shadow-none"
                id="searchInput"
                placeholder="Search destinations..."
                autocomplete="off"
              />
            </div>
            <div
              id="suggestionBox"
              class="list-group position-absolute w-100 shadow-lg d-none"
              style="z-index: 1050; top: 100%"
            ></div>
          </div>

          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-1">
            <li class="nav-item">
              <a
                class="nav-link active fw-bold text-dark px-3 rounded-pill"
                href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link fw-semibold text-dark px-3 rounded-pill hover-bg"
                href="aboutcam.html"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link fw-semibold text-dark px-3 rounded-pill hover-bg"
                href="culture.html"
                >Culture</a
              >
            </li>

            <li class="nav-item">
              <a
                class="nav-link active fw-semibold text-dark px-3 rounded-pill"
                href="food.html"
                >Delicacies</a
              >
            </li>

            <li class="nav-item">
              <a
                class="nav-link fw-semibold text-dark px-3 rounded-pill hover-bg bg-info"
                href="gallery.html"
                >Gallery</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link fw-semibold text-dark px-3 rounded-pill hover-bg"
                href="inquire.html"
                >Inquire</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link fw-semibold text-dark px-3 rounded-pill hover-bg"
                href="travel.html"
                >Tips</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Header Section -->
    <header class="about-header text-center">
      <div class="container">
        <h1 class="display-3 fw-bold">Island Visuals</h1>
        <p class="lead">A collection of 30 breathtaking views from Camiguin.</p>
      </div>
    </header>

    <!-- Gallery Grid -->
    <div class="py-5">
      <div class="container">
        <div class="row g-3" id="gallery-container"></div>
      </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content text-center">
          <div class="modal-body p-0 position-relative">
            <button
              type="button"
              class="btn-close btn-close-white position-absolute top-0 end-0 m-3"
              data-bs-dismiss="modal"
              aria-label="Close"
              style="z-index: 10"
            ></button>

            <img
              id="lightbox-image"
              src=""
              class="img-fluid w-100"
              alt="Preview"
            />

            <div class="p-3">
              <p id="lightbox-caption" class="lightbox-caption mb-3"></p>
              <div class="d-flex justify-content-center gap-3">
                <button
                  class="btn btn-outline-info rounded-pill px-4"
                  onclick="changeImage(-1)"
                >
                  ← Prev
                </button>
                <button
                  class="btn btn-outline-info rounded-pill px-4"
                  onclick="changeImage(1)"
                >
                  Next →
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-warning text-dark text-center py-3 mt-5">
      <p class="mb-0">Explore Camiguin, since Isle Be There.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="scriptsfolder/galleryscript.js"></script>
  </body>
</html>
