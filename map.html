<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link rel="icon" type="image/png" href="images/pogo.png" />
  <title>Map of Camiguin</title>
</head>

<body class="bg-light">

  <!-- HEADER -->
  <header class="bg-warning text-dark text-center py-4 shadow-sm">
    <div class="container">
      <h1 class="display-5 fw-bold">Map of Camiguin</h1>
      <p class="lead mb-2">Explore the Island's Geography</p>
      <a href="index.html#tour" class="btn btn-info btn-sm">← Back to Home</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="container my-5">

    <!-- MAP IMAGE -->
    <div class="card shadow-sm mb-5">
      <div class="card-body text-center">
        <h2 class="mb-3">Island Overview</h2>
        <img src="images/map.jpg" class="img-fluid rounded shadow" alt="Map of Camiguin">
      </div>
    </div>

    <!-- EMBEDDED MAP -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="text-center mb-3">Interactive Map</h2>

        <div class="rounded overflow-hidden">
          <iframe
            src="https://www.google.com/maps?q=Camiguin+Philippines&output=embed&z=11"
            width="100%"
            height="400"
            style="border:0;"
            loading="lazy">
          </iframe>
        </div>

      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="bg-warning text-dark text-center py-3 mt-5">
    <p class="mb-0">Explore Camiguin, since Isle Be There</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
